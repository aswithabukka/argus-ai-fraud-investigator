<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Argus — Fraud Ops Workbench</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#08090c;color:#eef1f6;font-family:'IBM Plex Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  *{box-sizing:border-box}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.11);border-radius:6px;border:2px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-track{background:transparent}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(255,82,69,.22)}50%{box-shadow:0 0 0 8px rgba(255,82,69,.03)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
  @keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .argx input::placeholder,.argx textarea::placeholder{color:#59616e}
  button{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script>
'use strict';
/* Argus Workbench — pixel-faithful vanilla-JS port of the design prototype
   (docs/design_handoff_argus_workbench/Argus Workbench.dc.html), wired to the
   real Argus backend instead of mock cases. */

const S = {
  tab:'overview', caseId:null, caseFilter:'all', queueId:null,
  live:{started:false,running:false,done:false,nodes:['pending','pending','pending','pending','pending','pending'],log:[]},
  decisions:{}, audit:{}, pendingAction:null, rationaleText:'',
  askCaseId:null, askInput:'', threads:{}, toast:null,
  cases:[], stats:null, asking:false,
};
let TIMERS=[];

const money=n=>'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc=t=>String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const riskColor=r=>r>=0.7?'#ff5245':(r>=0.4?'#f4b13c':'#37d68a');
const riskBand=r=>r>=0.7?'HIGH':(r>=0.4?'ELEVATED':'LOW');
const caseById=id=>S.cases.find(c=>c.id===id)||S.cases[0];

function showToast(title,body,color){
  S.toast={title,body,color}; render();
  TIMERS.push(setTimeout(()=>{ if(S.toast&&S.toast.title===title){S.toast=null;render();} },4200));
}

/* ============================ derived case view ============================ */
function expand(c){
  if(!c) return null;
  const dec=S.decisions[c.id];
  const isEsc=c.rec==='ESCALATE';
  const recColor=isEsc?'#ff5245':'#37d68a';
  const a=c.alert; const delta=a.after-a.before;
  const deltaFmt=(delta<0?'▾ ':'▴ ')+money(Math.abs(delta));
  const rc=riskColor(c.risk);
  const sig=sev=> sev==='crit'?{style:'background:rgba(255,82,69,.13);border:1px solid rgba(255,82,69,.3);color:#ff8078',dot:'#ff5245'}
    : sev==='warn'?{style:'background:rgba(244,177,60,.12);border:1px solid rgba(244,177,60,.3);color:#f4c46a',dot:'#f4b13c'}
    : {style:'background:rgba(55,214,138,.1);border:1px solid rgba(55,214,138,.28);color:#6fe0ac',dot:'#37d68a'};
  const recBadge=isEsc?'background:rgba(255,82,69,.15);color:#ff8078':'background:rgba(55,214,138,.14);color:#6fe0ac';

  // baseline chart — always 15 baseline slots + 1 alert slot, like the design;
  // with no prior history the slots render as minimal dashes so the alert bar
  // keeps its one-slot width instead of flooding the card.
  const hist=c.history||[];
  const noHist=!!c.noHistory||!hist.length;
  const maxV=Math.max.apply(null,hist.concat([a.amount,c.typical||0]));
  const slots=hist.length>=15?hist.slice(0,15):hist.concat(new Array(15-hist.length).fill(0));
  const histBars=slots.map(v=>'flex:1;min-width:3px;height:'+Math.max(4,Math.round(v/maxV*56))+'px;background:rgba(255,255,255,.13);border-radius:2px 2px 0 0');
  const alertBarStyle='flex:1;min-width:3px;height:'+Math.max(7,Math.round(a.amount/maxV*56))+'px;background:'+rc+';border-radius:2px 2px 0 0;box-shadow:0 0 12px '+(isEsc?'rgba(255,82,69,.55)':'rgba(244,177,60,.45)');
  const typLineStyle=noHist?'display:none':'position:absolute;left:0;right:0;bottom:'+Math.round(c.typical/maxV*56)+'px;border-top:1px dashed rgba(255,255,255,.26)';
  const mult=a.amount/c.typical; const multFmt=c.noHistory?'—':((mult>=10?Math.round(mult):mult.toFixed(1))+'×');
  let baselineNote;
  if(c.noHistory) baselineNote='No prior sending history — this is the account’s first recorded transaction. Freshness itself is a risk factor: fraud accounts are often brand new.';
  else if(mult<3) baselineNote='Amount sits within this account’s normal range ('+multFmt+' its typical). Nothing unusual about the size.';
  else if(isEsc) baselineNote='This transaction is '+multFmt+' larger than anything this account normally sends — a classic balance-drain signature.';
  else baselineNote='This is '+multFmt+' the account’s typical amount, but the destination is an established, clean counterparty — which is why Argus still cleared it.';

  // money flow
  const fk=c.flow.destKind;
  const fcol= fk==='mule'?'#ff5245':(fk==='merchant'?'#37d68a':'#6ea2ff');
  const flow={ sender:a.account.slice(0,8), dest:a.dest.slice(0,8), amount:money(a.amount), typeLabel:a.type.toLowerCase(),
    destColor:fcol, destLabel: fk==='mule'?'Mule account':(fk==='merchant'?'Verified merchant':'Customer account'),
    destBadge: fk==='mule'?'PASS-THRU':(fk==='merchant'?'VERIFIED':'HOLDS BAL'),
    destBg: fk==='mule'?'rgba(255,82,69,.07)':(fk==='merchant'?'rgba(55,214,138,.06)':'rgba(110,162,255,.06)'),
    destBorder: fk==='mule'?'rgba(255,82,69,.32)':(fk==='merchant'?'rgba(55,214,138,.3)':'rgba(110,162,255,.3)'),
    fanLabel:'×'+c.flow.fanIn+' in', isCashOut:c.flow.isCashOut,
    fanNote: fk==='mule'? c.flow.zeroBal+' of inflow passes straight through — textbook mule' : (fk==='merchant'?'aggregates many customers (normal for a merchant)':'destination retains its balance (normal)'),
    fanDotColor: fk==='mule'?'rgba(255,82,69,.55)':(fk==='merchant'?'rgba(55,214,138,.5)':'rgba(110,162,255,.5)') };

  // critic passes
  const passes=(c.criticPasses&&c.criticPasses.length)?c.criticPasses:[{flag:false,text:c.critic.text}];
  const revised=passes.length>1;
  const criticPasses=passes.map((p,i)=>({ n:i+1, statusText:p.flag?'flagged — sent back for revision':'approved',
    badge:p.flag?'⚠':'✓', badgeColor:p.flag?'#f4b13c':'#37d68a',
    bg:p.flag?'background:rgba(244,177,60,.07);border:1px solid rgba(244,177,60,.26)':'background:rgba(55,214,138,.06);border:1px solid rgba(55,214,138,.24)',
    text:p.text }));

  // analyzer vs policy
  const analyzerFlags=c.risk>=0.5; const policyEsc=c.policyVerdict==='ESCALATE';
  const analyzerLean=analyzerFlags?'FLAGS FRAUD':'READS BENIGN'; const analyzerColor=analyzerFlags?'#ff8078':'#6fe0ac';
  const agree=analyzerFlags===policyEsc;
  const agreeText=agree?'Both agents agree':'Agents disagree — resolved by fusion rule';
  const agreeIcon=agree?'✓':'⚠'; const agreeColor=agree?'#6fe0ac':'#f4b13c';
  const agreeBg=agree?'rgba(55,214,138,.06)':'rgba(244,177,60,.08)'; const agreeBorder=agree?'rgba(55,214,138,.24)':'rgba(244,177,60,.3)';

  // audit trail
  const revTxt=revised?'pass 1 flagged → pass 2 approved':'pass 1 approved';
  const sysEvents=[
    {t:'01',who:'retriever',what:'4 data tools called · evidence bundle assembled',color:'#6ea2ff'},
    {t:'02',who:'analyzer',what:'risk '+c.risk.toFixed(2)+' · '+c.signals.length+' signal(s) flagged',color:'#f4b13c'},
    {t:'03',who:'policy',what:'5 rules evaluated · verdict '+c.policyVerdict,color:'#f4b13c'},
    {t:'04',who:'critic',what:revTxt+' · 0 hallucinated figures',color:'#ff5245'},
    {t:'05',who:'assembler',what:'case file built · status PENDING_HUMAN_APPROVAL',color:'#37d68a'},
  ];
  const auEntries=S.audit[c.id]||[];
  const humanEvents=auEntries.map(e=>({t:e.ts,who:'A. Reyes',color:e.action==='approved'?'#ff8078':'#6fe0ac',
    what:(e.action==='approved'?'APPROVED · escalate & freeze':'DISMISSED · clear alert')+' — “'+e.rationale+'”'}));
  const auditView=sysEvents.concat(humanEvents);
  const lastHuman=auEntries[auEntries.length-1];

  const pa=S.pendingAction; const gateOpen=!!(pa&&pa.caseId===c.id);
  const gatePrompt=gateOpen?(pa.action==='approved'?'Confirm escalation — this freezes txn '+c.id:'Confirm dismissal — this clears txn '+c.id):'';

  const truthKnown=c.truth==='fraud'||c.truth==='legit';
  const wasCorrect=(c.rec==='ESCALATE')===(c.truth==='fraud');

  return { id:c.id, rec:c.rec, recColor, recBadge, recIcon:isEsc?'▲':'✓',
    recBg:isEsc?'background:rgba(255,82,69,.08);border:1px solid rgba(255,82,69,.28)':'background:rgba(55,214,138,.07);border:1px solid rgba(55,214,138,.26)',
    riskFmt:c.risk.toFixed(2), confFmt:c.conf.toFixed(2),
    riskColor:rc, riskBand:riskBand(c.risk), meterStyle:'height:100%;width:'+Math.round(c.risk*100)+'%;background:'+rc+';border-radius:3px',
    truthKnown, truthText:c.truth==='fraud'?'actually fraud':'actually legitimate', truthColor:c.truth==='fraud'?'#ff8078':'#6fe0ac',
    correctText:wasCorrect?'correct':'incorrect', correctColor:wasCorrect?'#6fe0ac':'#ff8078',
    statusText:lastHuman?(lastHuman.action==='approved'?'ESCALATED':'CLEARED'):'PENDING_APPROVAL',
    alertLine:'Account '+a.account+' initiated a '+a.type+' of '+money(a.amount)+' to '+a.dest+' at simulation hour '+a.hour+'.',
    alertCards:[
      {label:'Amount',value:money(a.amount),sub:a.type,subColor:'#8a929e'},
      {label:'Balance before',value:money(a.before),sub:'pre-txn',subColor:'#8a929e'},
      {label:'Balance after',value:money(a.after),sub:deltaFmt,subColor:delta<0?'#ff8078':'#6fe0ac'},
      {label:'Destination',value:a.dest.slice(0,7),sub:'hour '+a.hour,subColor:'#8a929e'},
    ],
    sender:c.sender, counter:c.counter, velocity:c.velocity,
    signals:c.signals.map(s=>{const t=sig(s[1]);return{label:s[0],dot:t.dot,style:t.style};}),
    policyRows:c.policy.map(p=>({rule:p[0],firedText:p[1]?'● FIRED':'— clear',firedColor:p[1]?'#ff5245':'#59616e',checks:p[2],values:p[3]})),
    policyVerdict:c.policyVerdict, policyVerdictColor:c.policyVerdict==='ESCALATE'?'#ff5245':'#37d68a', policyNote:c.policyNote,
    reasoning:c.reasoning, nHist:hist.length,
    histLegend:noHist?'0 prior transactions':hist.length+' prior transaction'+(hist.length===1?'':'s')+' · - - typical',
    histBars, alertBarStyle, typLineStyle, multFmt, baselineNote,
    flow, criticPasses,
    analyzerLean, analyzerColor, agreeText, agreeIcon, agreeColor, agreeBg, agreeBorder,
    audit:auditView,
    trace:[['Orchestrator','planned'],['Retriever','evidence'],['Analyzer','risk '+c.risk.toFixed(2)],['Policy',c.policyVerdict.toLowerCase()],['Critic',revised?'revised → ok':'approved'],['Case File','assembled']],
    approveLabel:isEsc?'Approve escalation':'Override → escalate',
    dismissLabel:isEsc?'Dismiss alert':'Confirm clear',
    decided:!!dec, gateOpen, gatePrompt, showButtons:!dec&&!gateOpen,
    decisionText:dec==='approved'?'Escalated & frozen (simulated)':'Cleared — alert dismissed',
    decisionColor:dec==='approved'?'#ff8078':'#6fe0ac', decisionIcon:dec==='approved'?'▲':'✓',
    decisionBg:dec==='approved'?'background:rgba(255,82,69,.1);border:1px solid rgba(255,82,69,.3)':'background:rgba(55,214,138,.1);border:1px solid rgba(55,214,138,.28)',
    decisionRationale:lastHuman?lastHuman.rationale:'', decisionTime:lastHuman?lastHuman.ts:'' };
}

/* ============================ actions ============================ */
const App={
  nav(t){S.tab=t;render();},
  selCase(id){S.caseId=id;render();},
  selQueue(id){S.queueId=id;render();},
  selAsk(id){S.askCaseId=id;render();},
  filter(f){S.caseFilter=f;render();},
  openGate(id,action){S.pendingAction={caseId:id,action};S.rationaleText='';render();},
  cancelGate(){S.pendingAction=null;S.rationaleText='';render();},
  onRat(el){
    S.rationaleText=el.value;
    const n=(el.value||'').trim().length, ok=n>=8;
    const cnt=document.getElementById('ratcount');
    if(cnt){cnt.textContent=n+' / 8 min chars';cnt.style.color=ok?'#6fe0ac':'#6b7381';}
    const btn=document.getElementById('ratconfirm');
    if(btn){
      const act=S.pendingAction?S.pendingAction.action:'approved';
      const col=act==='approved'?'#ff5245':'#37d68a';
      btn.style.cssText='display:inline-flex;align-items:center;gap:8px;border:none;font:600 13px \'IBM Plex Sans\';padding:11px 20px;border-radius:10px;'+
        (ok?('background:'+col+';color:#fff;cursor:pointer;box-shadow:0 5px 16px '+(act==='approved'?'rgba(255,82,69,.3)':'rgba(55,214,138,.25)')):'background:#22262e;color:#59616e;cursor:not-allowed');
    }
  },
  commitGate(){
    const pa=S.pendingAction; if(!pa)return;
    const r=(S.rationaleText||'').trim(); if(r.length<8)return;
    const ts=new Date().toTimeString().slice(0,8);
    S.decisions[pa.caseId]=pa.action;
    S.audit[pa.caseId]=(S.audit[pa.caseId]||[]).concat([{ts,action:pa.action,rationale:r}]);
    S.pendingAction=null;S.rationaleText='';
    fetch('/api/decision',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({caseId:pa.caseId,action:pa.action,rationale:r})}).catch(()=>{});
    if(pa.action==='approved') showToast('Escalation approved','txn '+pa.caseId+' frozen (simulated) · logged to audit trail','#ff5245');
    else showToast('Alert cleared','txn '+pa.caseId+' dismissed · logged to audit trail','#37d68a');
  },
  undo(id){
    delete S.decisions[id];
    if(S.audit[id]) S.audit[id]=S.audit[id].slice(0,-1);
    fetch('/api/decision/'+id,{method:'DELETE'}).catch(()=>{});
    render();
  },
  onAskIn(el){S.askInput=el.value;},
  askKey(ev){if(ev.key==='Enter')App.ask();},
  askText(t){S.askInput=t;App.ask();},
  ask(){
    const q=(S.askInput||'').trim(); if(!q||S.asking)return;
    const id=S.askCaseId;
    S.threads[id]=(S.threads[id]||[]).concat([{q,a:'… checking the case record'}]);
    S.askInput='';S.asking=true;render();
    fetch('/api/ask',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({caseId:id,question:q})})
      .then(r=>r.ok?r.json():Promise.reject())
      .then(res=>{const th=S.threads[id];th[th.length-1]={q,a:res.answer};})
      .catch(()=>{const th=S.threads[id];th[th.length-1]={q,a:'The backend could not be reached — answer unavailable. (Is the Gemini key configured?)'};})
      .finally(()=>{S.asking=false;render();});
  },
  runLive(){
    TIMERS.forEach(clearTimeout);TIMERS=[];
    const c=caseById(S.queueId);
    if(!c)return;
    const sigNames=c.signals.map(s=>s[0]).slice(0,2).join(', ');
    const fired=c.policy.filter(p=>p[1]).length;
    const revised=(c.criticPasses||[]).length>1;
    const logs=[
      'plan: retrieve → analyze → policy → critic → assemble',
      'get_transaction('+c.id+') ✓  get_customer_history ✓  get_counterparty_risk ✓  compute_velocity ✓',
      'signals: '+sigNames+' · risk score '+c.risk.toFixed(2),
      '5 rules evaluated · '+fired+' fired · verdict '+c.policyVerdict,
      revised?'pass 1 flagged a claim → revised → pass 2 approved':'verifying claims … approved · 0 hallucinated figures',
      'case file assembled · status PENDING_HUMAN_APPROVAL',
    ];
    S.live={started:true,running:true,done:false,nodes:['pending','pending','pending','pending','pending','pending'],log:[]};
    render();
    // real pipeline run — the final node completes only when the backend does
    const run=fetch('/api/live-triage',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({txn_id:Number(c.id)})}).then(r=>r.ok?r.json():Promise.reject()).catch(()=>null);
    const STEP=2600,ACT=1500;
    for(let i=0;i<5;i++){
      TIMERS.push(setTimeout(()=>{S.live.nodes[i]='active';render();},i*STEP));
      TIMERS.push(setTimeout(()=>{S.live.nodes[i]='done';S.live.log[i]=logs[i];render();},i*STEP+ACT));
    }
    TIMERS.push(setTimeout(()=>{S.live.nodes[5]='active';render();},5*STEP));
    TIMERS.push(setTimeout(()=>{
      run.then(res=>{
        if(res&&res.cases){S.cases=res.cases;seedDecisions();}
        S.live.nodes[5]='done';S.live.log[5]=logs[5];
        S.live.running=false;S.live.done=true;
        const cc=caseById(S.queueId);
        showToast('Investigation complete','txn '+cc.id+' · '+cc.rec+' · awaiting your decision',cc.rec==='ESCALATE'?'#ff5245':'#37d68a');
        render();
      });
    },5*STEP+400));
  },
};
window.App=App;

function seedDecisions(){
  S.cases.forEach(c=>{
    const log=c.humanLog||[];
    if(log.length){S.decisions[c.id]=log[log.length-1].action;S.audit[c.id]=log;}
    else{delete S.decisions[c.id];delete S.audit[c.id];}
  });
}

/* ============================ shared style tokens ============================ */
const secHead='display:flex;align-items:center;gap:11px;margin:30px 0 13px';
const secNum='font:600 11px \'IBM Plex Mono\';color:#ff5245;background:rgba(255,82,69,.12);border:1px solid rgba(255,82,69,.25);width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;flex:none';
const secTitle='font:600 17px \'IBM Plex Sans\'';
const secSub='font:400 12px \'IBM Plex Mono\';color:#6b7381';
const evRow='display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-top:1px solid rgba(255,255,255,.05);font:400 12px \'IBM Plex Sans\';color:#8a929e';
const evVal='color:#eef1f6;font-family:\'IBM Plex Mono\';font-weight:500';
const thc='padding:10px 14px;font:600 10px \'IBM Plex Mono\';letter-spacing:.6px;color:#6b7381';
const card='background:#101319;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:18px 20px;box-shadow:inset 0 1px 0 rgba(255,255,255,.03)';

function sectionHead(n,title,sub){
  return '<div style="'+secHead+'"><span style="'+secNum+'">'+n+'</span><span style="'+secTitle+'">'+title+'</span>'+(sub?'<span style="'+secSub+'">'+sub+'</span>':'')+'</div>';
}

/* ============================ view renderers ============================ */
function navRail(){
  const st=S.stats||{};
  const navBtn=id=>{const on=S.tab===id;return 'display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:'+(on?'rgba(255,82,69,.1)':'transparent')+';border:none;border-left:2px solid '+(on?'#ff5245':'transparent')+';color:'+(on?'#eef1f6':'#8a929e')+';font:600 13px \'IBM Plex Sans\';padding:11px 12px;border-radius:0 8px 8px 0;cursor:pointer';};
  let evalLabel='idle',evalColor='#8a929e',evalDot='width:10px;height:10px;border-radius:50%;display:inline-block;box-sizing:border-box;border:2px solid rgba(255,255,255,.25);background:transparent';
  if(S.live.running){evalLabel='running';evalColor='#f4b13c';evalDot='width:10px;height:10px;border-radius:50%;display:inline-block;background:#f4b13c;box-shadow:0 0 0 4px rgba(244,177,60,.18);animation:pulse 1.1s infinite';}
  else if(S.live.done){evalLabel='done';evalColor='#37d68a';evalDot='width:10px;height:10px;border-radius:50%;display:inline-block;background:#37d68a;box-shadow:0 0 0 3px rgba(55,214,138,.16)';}
  const pct=Math.round(100*(st.nEval||0)/80);
  return '<aside style="width:230px;flex:none;background:#0b0d11;border-right:1px solid rgba(255,255,255,.06);position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:20px 16px">'
    +'<div style="display:flex;align-items:center;gap:11px;padding:2px 6px 20px">'
    +'<span style="width:32px;height:32px;flex:none;border-radius:9px;background:#ff5245;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(255,82,69,.4)"><span style="width:14px;height:15px;background:#fff;display:block;clip-path:polygon(50% 0,100% 22%,100% 58%,50% 100%,0 58%,0 22%)"></span></span>'
    +'<div><div style="font:700 17px \'IBM Plex Sans\';letter-spacing:.4px;line-height:1">ARGUS</div><div style="font:500 9.5px \'IBM Plex Mono\';letter-spacing:1px;color:#59616e;margin-top:3px">FRAUD OPS</div></div></div>'
    +'<nav style="display:flex;flex-direction:column;gap:3px">'
    +'<button onclick="App.nav(\'overview\')" style="'+navBtn('overview')+'"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>Overview</button>'
    +'<button onclick="App.nav(\'cases\')" style="'+navBtn('cases')+'"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="3" width="16" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="13" y2="16"/></svg>Case files</button>'
    +'<button onclick="App.nav(\'live\')" style="'+navBtn('live')+'"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="2.6" fill="currentColor" stroke="none"/></svg>Live triage</button>'

function gateBlock(v,idPrefix){
  const rlen=(S.rationaleText||'').trim().length, rok=rlen>=8;
  const act=S.pendingAction?S.pendingAction.action:'approved';
  const col=act==='approved'?'#ff5245':'#37d68a';
  const confirmStyle='display:inline-flex;align-items:center;gap:8px;border:none;font:600 13px \'IBM Plex Sans\';padding:11px 20px;border-radius:10px;'+(rok?('background:'+col+';color:#fff;cursor:pointer;box-shadow:0 5px 16px '+(act==='approved'?'rgba(255,82,69,.3)':'rgba(55,214,138,.25)')):'background:#22262e;color:#59616e;cursor:not-allowed');
  const confirmLabel=act==='approved'?'Confirm & freeze':'Confirm & clear';
  let inner='';
  if(v.decided){
    inner='<div style="display:flex;gap:13px;align-items:flex-start;padding:15px 16px;border-radius:12px;'+v.decisionBg+'">'
      +'<span style="font:600 16px \'IBM Plex Mono\';color:'+v.decisionColor+'">'+v.decisionIcon+'</span>'
      +'<div style="flex:1;min-width:0"><div style="font:600 13.5px \'IBM Plex Sans\';color:'+v.decisionColor+'">'+v.decisionText+'</div>'
      +'<div style="font:400 12.5px/1.55 \'IBM Plex Sans\';color:#c7cdd8;margin-top:6px">“'+esc(v.decisionRationale)+'”</div>'
      +'<div style="font:400 10.5px \'IBM Plex Mono\';color:#6b7381;margin-top:7px">A. Reyes · '+esc(v.decisionTime)+'</div></div>'
      +'<button onclick="App.undo(\''+v.id+'\')" style="background:transparent;border:1px solid rgba(255,255,255,.16);color:#8a929e;font:500 11.5px \'IBM Plex Sans\';padding:6px 12px;border-radius:8px;cursor:pointer">Undo</button></div>';
  }else if(v.gateOpen){
    inner='<div style="font:600 12.5px \'IBM Plex Sans\';color:#eef1f6;margin-bottom:9px">'+v.gatePrompt+'</div>'
      +'<textarea id="rat'+idPrefix+'" oninput="App.onRat(this)" placeholder="Document your reasoning — this becomes the permanent audit record for this decision…" style="width:100%;min-height:80px;background:#0c0e13;border:1px solid rgba(255,255,255,.14);color:#eef1f6;font:400 13px/1.5 \'IBM Plex Sans\';padding:12px 14px;border-radius:10px;outline:none;resize:vertical">'+esc(S.rationaleText)+'</textarea>'
      +'<div style="display:flex;align-items:center;gap:12px;margin-top:12px">'
      +'<span id="ratcount" style="font:500 10.5px \'IBM Plex Mono\';color:'+(rok?'#6fe0ac':'#6b7381')+'">'+rlen+' / 8 min chars</span>'
      +'<div style="margin-left:auto;display:flex;gap:10px">'
      +'<button onclick="App.cancelGate()" style="background:transparent;border:1px solid rgba(255,255,255,.16);color:#aab2bf;font:600 13px \'IBM Plex Sans\';padding:11px 18px;border-radius:10px;cursor:pointer">Cancel</button>'
      +'<button id="ratconfirm" onclick="App.commitGate()" style="'+confirmStyle+'">'+confirmLabel+'</button></div></div>';
  }else{
    inner='<div style="display:flex;gap:12px;flex-wrap:wrap">'
      +'<button onclick="App.openGate(\''+v.id+'\',\'dismissed\')" style="display:inline-flex;align-items:center;gap:8px;background:transparent;color:#37d68a;border:1px solid rgba(55,214,138,.42);font:600 13.5px \'IBM Plex Sans\';padding:12px 20px;border-radius:10px;cursor:pointer"><span style="font-family:\'IBM Plex Mono\'">✓</span> '+v.dismissLabel+'</button>'
      +'<button onclick="App.openGate(\''+v.id+'\',\'approved\')" style="display:inline-flex;align-items:center;gap:8px;background:#ff5245;color:#fff;border:none;font:600 13.5px \'IBM Plex Sans\';padding:12px 20px;border-radius:10px;cursor:pointer;box-shadow:0 5px 16px rgba(255,82,69,.3)"><span style="font-family:\'IBM Plex Mono\'">▲</span> '+v.approveLabel+'</button></div>';
  }
  return inner;
}

    : 'status <span style="font-family:\'IBM Plex Mono\';color:#aab2bf">'+v.statusText+'</span>';
  return '<div style="padding:26px 34px 70px;max-width:940px;animation:fadeUp .25s ease">'

function casesView(){
  const fLabel={all:'All',escalate:'Escalated',clear:'Cleared'};
  const filters=['all','escalate','clear'].map(f=>'<button onclick="App.filter(\''+f+'\')" style="background:'+(S.caseFilter===f?'#1d222b':'transparent')+';border:1px solid '+(S.caseFilter===f?'rgba(255,255,255,.18)':'rgba(255,255,255,.09)')+';color:'+(S.caseFilter===f?'#eef1f6':'#8a929e')+';font:600 11.5px \'IBM Plex Sans\';padding:6px 12px;border-radius:8px;cursor:pointer">'+fLabel[f]+'</button>').join('');
  const filtered=S.cases.filter(c=>S.caseFilter==='all'?true:(S.caseFilter==='escalate'?c.rec==='ESCALATE':c.rec==='CLEAR'));
  const rows=filtered.map(c=>{
    const rc=riskColor(c.risk); const dec=S.decisions[c.id]; const isEsc=c.rec==='ESCALATE'; const on=S.caseId===c.id;
    return '<button onclick="App.selCase(\''+c.id+'\')" style="display:block;width:100%;text-align:left;background:'+(on?'#141922':'#0d1015')+';border:1px solid '+(on?'rgba(255,82,69,.35)':'rgba(255,255,255,.06)')+';border-radius:12px;padding:13px 15px;margin-bottom:9px;cursor:pointer">'
      +'<div style="display:flex;align-items:center;gap:9px"><span style="font:600 13px \'IBM Plex Mono\';color:#eef1f6">txn '+c.id+'</span>'
      +'<span style="font:600 10px \'IBM Plex Mono\';letter-spacing:.4px;padding:2px 7px;border-radius:5px;'+(isEsc?'background:rgba(255,82,69,.15);color:#ff8078':'background:rgba(55,214,138,.14);color:#6fe0ac')+'">'+c.rec+'</span>'
      +'<span style="margin-left:auto;font:600 13px \'IBM Plex Mono\';color:'+rc+'">'+Math.round(c.risk*100)+'</span></div>'
      +'<div style="display:flex;align-items:center;gap:8px;margin-top:8px;font:500 12px \'IBM Plex Sans\';color:#8a929e"><span>'+c.alert.type+'</span><span style="color:#3a414c">·</span><span style="color:#c7cdd8;font-family:\'IBM Plex Mono\'">'+money(c.alert.amount)+'</span></div>'
      +'<div style="height:4px;border-radius:3px;background:rgba(255,255,255,.07);margin-top:10px;overflow:hidden"><div style="height:100%;width:'+Math.round(c.risk*100)+'%;background:'+rc+';border-radius:3px"></div></div>'
      +'<div style="display:flex;align-items:center;gap:7px;margin-top:9px"><span style="font:500 10px \'IBM Plex Mono\';color:#6b7381">truth: '+c.truth+'</span>'
      +'<span style="margin-left:auto;font:600 10px \'IBM Plex Mono\';'+(dec?(dec==='approved'?'color:#ff8078':'color:#6fe0ac'):'color:#59616e')+'">'+(dec?(dec==='approved'?'ESCALATED':'CLEARED'):'PENDING')+'</span></div>'
      +'</button>';
  }).join('');
  const sel=expand(caseById(S.caseId));
  return '<div style="display:flex;height:100vh">'
    +'<div style="width:340px;flex:none;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;background:#0a0c10">'
    +'<div style="padding:18px 20px 12px"><div style="font:700 16px \'IBM Plex Sans\'">Investigated cases</div>'
    +'<div style="font:400 11.5px \'IBM Plex Mono\';color:#6b7381;margin-top:2px">'+S.cases.length+' on disk · '+filtered.length+' shown</div>'
    +'<div style="display:flex;gap:6px;margin-top:14px">'+filters+'</div></div>'
    +'<div style="flex:1;overflow-y:auto;padding:4px 12px 20px">'+rows+'</div></div>'
    +'<div style="flex:1;min-width:0;overflow-y:auto">'+caseDetail(sel)+'</div>'
    +'</div>';
}

function liveView(){

    const c=caseById(id); const on=S.queueId===id;
    return '<button onclick="App.selQueue(\''+id+'\')" style="display:block;width:100%;text-align:left;background:'+(on?'#141922':'#0d1015')+';border:1px solid '+(on?'rgba(255,82,69,.35)':'rgba(255,255,255,.06)')+';border-radius:12px;padding:13px 15px;margin-bottom:9px;cursor:pointer">'
      +'<div style="display:flex;align-items:center;gap:9px"><span style="width:9px;height:9px;border-radius:50%;background:'+riskColor(c.risk)+';flex:none"></span>'
      +'<span style="font:600 13px \'IBM Plex Mono\';color:#eef1f6">txn '+c.id+'</span>'
      +'<span style="margin-left:auto;font:500 10px \'IBM Plex Mono\';color:'+(c.truth==='fraud'?'#ff8078':'#6fe0ac')+'">'+(c.truth==='fraud'?'known fraud':'known legit')+'</span></div>'

  }).join('');
  const runBtnLabel=S.live.running?'Investigating…':(S.live.done?'Re-run':'Investigate alert');
  const runBtnIcon=S.live.running?'◐':'▶';
  const runBtnState=S.live.running?'opacity:.7;pointer-events:none':'';
  const nodeNames=['Orchestrator','Retriever','Analyzer','Policy','Critic','Case File'];
  const nodes=S.live.nodes.map((st,i)=>{

    const logText=(st==='pending')?'queued':(S.live.log[i]||'running …');
    return '<div style="display:flex;gap:16px;align-items:flex-start;position:relative;padding-bottom:18px"><div style="display:flex;flex-direction:column;align-items:center;flex:none"><span style="'+dot+'"></span><span style="'+line+'"></span></div><div style="padding-top:1px"><div style="font:600 13.5px \'IBM Plex Sans\';color:'+label+'">'+nodeNames[i]+'</div><div style="font:500 11.5px/1.5 \'IBM Plex Mono\';color:'+logc+';margin-top:3px">'+esc(logText)+'</div></div></div>';
  }).join('');
  const lv=expand(caseById(S.queueId));
  let pane='';

    pane='<div style="height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px">'
      +'<span style="width:56px;height:56px;border-radius:15px;background:#101319;border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#ff5245" stroke-width="2"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="2.6" fill="#ff5245" stroke="none"/></svg></span>'
      +'<div style="font:600 17px \'IBM Plex Sans\'">Ready to investigate</div>'
      +'<div style="max-width:420px;font:400 13px/1.6 \'IBM Plex Sans\';color:#8a929e">Pick an alert from the queue and run the full agent pipeline live (~30–60s, real API calls). You’ll get the same report as Case Files and make the final call.</div></div>';
  }else{
    pane='<div style="font:700 18px \'IBM Plex Sans\';margin-bottom:4px">Investigating txn '+lv.id+'</div>'
      +'<div style="font:400 12px \'IBM Plex Mono\';color:#6b7381;margin-bottom:20px">running multi-agent pipeline · real backend</div>'
      +'<div style="position:relative;padding-left:6px">'+nodes+'</div>';
    if(S.live.done){
      pane+='<div style="margin-top:14px;animation:fadeUp .35s ease">'
        +'<div style="border-radius:14px;padding:20px 22px;'+lv.recBg+'"><div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap"><span style="font:600 20px \'IBM Plex Mono\';color:'+lv.recColor+'">'+lv.recIcon+'</span><span style="font:700 20px \'IBM Plex Sans\';color:'+lv.recColor+'">Recommendation: '+lv.rec+'</span><span style="margin-left:auto;font:500 12px \'IBM Plex Mono\';color:#aab2bf">risk <b style="color:'+lv.recColor+'">'+lv.riskFmt+'</b> · conf <b style="color:#eef1f6">'+lv.confFmt+'</b></span></div></div>'
        +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-top:14px">'
        +lv.alertCards.map(k=>'<div style="background:#101319;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px 15px"><div style="font:500 11px \'IBM Plex Sans\';color:#8a929e">'+k.label+'</div><div style="font:600 19px \'IBM Plex Mono\';margin-top:5px">'+esc(k.value)+'</div><div style="font:500 10.5px \'IBM Plex Mono\';margin-top:4px;color:'+k.subColor+'">'+esc(k.sub)+'</div></div>').join('')
        +'</div>'
        +'<div style="margin-top:16px;display:flex;gap:9px;flex-wrap:wrap">'+lv.signals.map(s=>'<span style="display:inline-flex;align-items:center;gap:8px;font:500 12.5px \'IBM Plex Mono\';padding:8px 13px;border-radius:8px;'+s.style+'"><span style="width:7px;height:7px;border-radius:50%;background:'+s.dot+'"></span>'+esc(s.label)+'</span>').join('')+'</div>'
        +'<div style="margin-top:16px;display:flex;flex-direction:column;gap:8px">'
        +lv.criticPasses.map(p=>'<div style="display:flex;gap:13px;align-items:flex-start;border-radius:12px;padding:13px 15px;'+p.bg+'"><span style="width:22px;height:22px;flex:none;border-radius:7px;display:flex;align-items:center;justify-content:center;font:600 12px \'IBM Plex Mono\';color:'+p.badgeColor+';border:1px solid '+p.badgeColor+'">'+p.badge+'</span><div><div style="font:600 12px \'IBM Plex Sans\'">Critic pass '+p.n+' · '+p.statusText+'</div><div style="font:400 12px/1.5 \'IBM Plex Sans\';color:#aab2bf;margin-top:3px">'+esc(p.text)+'</div></div></div>').join('')
        +'</div>'
        +'<div style="margin-top:20px;border:1px solid rgba(255,82,69,.25);background:linear-gradient(180deg,rgba(255,82,69,.06),rgba(255,82,69,.015));border-radius:14px;padding:20px 22px">'
        +'<div style="font:600 10px \'IBM Plex Mono\';letter-spacing:1px;color:#ff8078">HUMAN APPROVAL GATE</div>'
        +'<div style="font:400 12.5px/1.6 \'IBM Plex Sans\';color:#aab2bf;margin:8px 0 16px">You are the final decision-maker on txn '+lv.id+'. Your rationale is logged.</div>'
        +gateBlock(lv,'live')
        +'</div></div>';
    }
  }
  return '<div style="display:flex;height:100vh">'
    +'<div style="width:340px;flex:none;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;background:#0a0c10">'
    +'<div style="padding:18px 20px 12px"><div style="font:700 16px \'IBM Plex Sans\'">Alert queue</div><div style="font:400 11.5px \'IBM Plex Mono\';color:#6b7381;margin-top:2px">select an alert to investigate live</div></div>'

    +'<div style="padding:14px 18px;border-top:1px solid rgba(255,255,255,.06)"><button onclick="App.runLive()" style="width:100%;display:inline-flex;align-items:center;justify-content:center;gap:9px;background:#ff5245;color:#fff;border:none;font:600 13.5px \'IBM Plex Sans\';padding:13px;border-radius:11px;cursor:pointer;box-shadow:0 5px 16px rgba(255,82,69,.3);'+runBtnState+'"><span style="font-family:\'IBM Plex Mono\'">'+runBtnIcon+'</span> '+runBtnLabel+'</button></div></div>'
    +'<div style="flex:1;min-width:0;overflow-y:auto"><div style="padding:26px 34px 70px;max-width:940px">'+pane+'</div></div>'
    +'</div>';
}

    +'<div style="display:flex;flex-direction:column;gap:14px;margin-bottom:22px">'+thread+'</div>'
    +'<div style="display:flex;gap:10px;position:sticky;bottom:20px">'
    +'<input id="askin" value="'+esc(S.askInput)+'" oninput="App.onAskIn(this)" onkeydown="App.askKey(event)" placeholder="Ask about case '+S.askCaseId+' — e.g. what pointed to a mule account?" style="flex:1;background:#101319;border:1px solid rgba(255,255,255,.13);color:#eef1f6;font:400 13.5px \'IBM Plex Sans\';padding:13px 16px;border-radius:11px;outline:none">'
    +'<button onclick="App.ask()" style="background:#ff5245;color:#fff;border:none;font:600 13.5px \'IBM Plex Sans\';padding:0 22px;border-radius:11px;cursor:pointer'+(S.asking?';opacity:.6;pointer-events:none':'')+'">Ask</button></div>'
    +'</div></div>';
}

/* ============================ root render ============================ */
function render(){
  let main='';
  if(!S.cases.length){
    main='<div style="flex:1;display:flex;align-items:center;justify-content:center;height:100vh;color:#59616e;font:500 13px \'IBM Plex Mono\'">loading cases from the Argus backend …</div>';
  }
  else if(S.tab==='overview') main='<main style="flex:1;min-width:0">'+overviewView()+'</main>';
  else if(S.tab==='cases') main='<main style="flex:1;min-width:0">'+casesView()+'</main>';
  else if(S.tab==='live') main='<main style="flex:1;min-width:0">'+liveView()+'</main>';
  else main='<main style="flex:1;min-width:0">'+askView()+'</main>';

  const toast=S.toast?'<div style="position:fixed;bottom:24px;right:24px;z-index:60;background:#14181f;border:1px solid rgba(255,255,255,.12);border-left:3px solid '+S.toast.color+';border-radius:12px;padding:14px 18px;box-shadow:0 14px 44px rgba(0,0,0,.55);animation:toastIn .25s ease;max-width:340px"><div style="font:600 12.5px \'IBM Plex Sans\'">'+esc(S.toast.title)+'</div><div style="font:400 12px/1.5 \'IBM Plex Mono\';color:#8a929e;margin-top:4px">'+esc(S.toast.body)+'</div></div>':'';
  document.getElementById('root').innerHTML='<div class="argx" style="display:flex;min-height:100vh;background:#08090c">'+navRail()+main+toast+'</div>';
}

/* ============================ boot ============================ */
render();
Promise.all([
  fetch('/api/cases').then(r=>r.json()),
  fetch('/api/stats').then(r=>r.json()),
]).then(([cases,stats])=>{
  S.cases=cases; S.stats=stats;
  seedDecisions();
  if(cases.length){S.caseId=cases[0].id;S.queueId=cases[0].id;S.askCaseId=cases[0].id;}
  // deep links: #cases / #live / #ask, optionally #cases=<txn_id>
  const h=(location.hash||'').slice(1);
  if(h){ const [tab,id]=h.split('='); if(['overview','cases','live','ask'].includes(tab)) S.tab=tab;
    if(id&&caseById(id)){S.caseId=id;S.queueId=id;S.askCaseId=id;} }
  render();
}).catch(()=>{
  document.getElementById('root').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#ff8078;font:500 14px \'IBM Plex Mono\'">could not reach the Argus backend — start it with:&nbsp;<b>uvicorn serve:app --port 8600</b></div>';
});
</script>
</body>
</html>
